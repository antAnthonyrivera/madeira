<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Planner</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Trip Planner</h1>
      <div class="row">
        <label for="trip-selector"><strong>Trip:</strong></label>
        <select id="trip-selector"></select>
        <button id="add-trip-btn" type="button" class="small">New Trip</button>
      </div>
    </header>

    <main class="map-only-layout">
      <section class="panel map-panel">
        <div class="map-wrap">
          <div id="map"></div>

          <button id="map-overlay-toggle" type="button" class="overlay-toggle">Hide Panel</button>

          <aside id="map-overlay-panel" class="map-overlay-panel">
            <div class="stack">
              <label for="selected-day">Selected day</label>
              <input id="selected-day" type="date" />

              <label for="current-user">Current user</label>
              <select id="current-user"></select>
            </div>

            <h3>Team Members</h3>
            <div id="member-list" class="chips"></div>

            <h3>Notifications</h3>
            <div id="notification-list" class="stack">
              <p class="empty">No notifications.</p>
            </div>

            <section class="active-layers">
              <div class="row between tight-bottom">
                <h3>Map Data</h3>
                <button id="clear-data" class="danger small">Reset</button>
              </div>

              <details open>
                <summary><strong>Activities</strong></summary>
                <div id="daily-activity-list" class="stack">
                  <p class="empty">No activities for selected day.</p>
                </div>
              </details>

              <details open>
                <summary><strong>Layers</strong></summary>
                <div id="active-layer-list" class="stack">
                  <p class="empty">No WMS layers active.</p>
                </div>
              </details>
            </section>
          </aside>

          <div class="fab-stack">
            <button id="map-add-menu-toggle" class="fab" type="button" title="Add">+</button>
            <div id="map-add-menu" class="fab-menu hidden">
              <button id="open-wms-modal" type="button" class="small">Add Layer</button>
              <button id="open-activity-modal" type="button" class="small">Add Activity</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="wms-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="row between tight-bottom">
          <h2>Add WMS Overlay</h2>
          <button id="close-wms-modal-top" type="button" class="danger small">Close</button>
        </div>
        <div class="stack">
          <label for="wms-url-input">WMS URL</label>
          <input id="wms-url-input" value="https://view.eumetsat.int/geoserver/wms" />
          <button id="load-wms-layers" type="button">Load Layers</button>
          <p id="wms-error" class="status-text warn hidden"></p>
        </div>
        <div id="wms-layer-selector" class="stack hidden">
          <h3>Available Layers</h3>
          <div id="wms-layer-options" class="stack"></div>
          <div class="row">
            <button id="add-selected-layers" type="button">Add Selected</button>
            <button id="close-wms-modal" type="button" class="danger">Done</button>
          </div>
        </div>
      </div>
    </div>

    <div id="activity-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="row between tight-bottom">
          <h2>Add Activity</h2>
          <button id="close-activity-modal" type="button" class="danger small">Close</button>
        </div>
        <form id="activity-form" class="stack">
          <label for="activity-title">Title</label>
          <input id="activity-title" required maxlength="80" placeholder="PR8 Ponta de Sao Lourenco" />

          <label for="activity-day">Day</label>
          <input id="activity-day" type="date" required />

          <label for="activity-time">Start time</label>
          <input id="activity-time" type="time" required />

          <label for="activity-category">Category emoji</label>
          <select id="activity-category">
            <option value="🏔️">🏔️ Hike</option>
            <option value="🏖️">🏖️ Beach</option>
            <option value="🍽️">🍽️ Food</option>
            <option value="🚗">🚗 Drive</option>
            <option value="🌅">🌅 Sunset</option>
            <option value="📸">📸 Photo Spot</option>
          </select>

          <label for="activity-notes">Details</label>
          <textarea id="activity-notes" rows="3" placeholder="Add context, prep, or plan details."></textarea>

          <label for="activity-tags">Tag collaborators</label>
          <div id="activity-tags" class="chips"></div>

          <label for="activity-location">Place name</label>
          <input id="activity-location" placeholder="e.g. Porto Moniz" />

          <label for="activity-address">Address (optional)</label>
          <div class="row">
            <input id="activity-address" placeholder="e.g. Fanal Forest, Madeira" />
            <button type="button" id="geocode-address" class="small">Geocode</button>
          </div>

          <label for="activity-lat">Latitude</label>
          <input id="activity-lat" placeholder="32.7607" />

          <label for="activity-lng">Longitude</label>
          <input id="activity-lng" placeholder="-17.1462" />

          <div class="row">
            <button type="button" id="place-on-map" class="small">Pick on Map</button>
            <span id="activity-loc-status" class="status-text"></span>
          </div>

          <button type="submit">Save Activity</button>
        </form>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js"></script>
  </body>
</html>
